{% extends "base.html" %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 1rem;">
    <img src="/static/Planazo_logo.png" alt="Logo" style="height: 120px; width: auto; display: block; margin: 0 auto;">
</div>
<h1>🌟 Crear cuenta premium</h1>
        <p class="login-sub">Registrate para guardar tus planes favoritos y más.</p>

        {% if error %}
        <div class="alert-error">❌ {{ error }}</div>
        {% endif %}

        <form method="post" action="/registro">
            <div class="form-grupo">
                <label>Nombre</label>
                <input type="text" name="nombre" required placeholder="Tu nombre">
            </div>
            <div class="form-grupo">
                <label>Email</label>
                <input type="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-grupo">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <div class="my-4">
                <label class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-800 hover:border-indigo-500 dark:hover:border-indigo-500 transition-all duration-300 cursor-pointer select-none">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">🏢</span>
                        <div class="text-left">
                            <span class="block text-sm font-bold text-slate-800 dark:text-slate-200">Cuenta de Empresa</span>
                            <span class="block text-xs text-slate-500 dark:text-slate-400">Quiero publicar mis propios planes</span>
                        </div>
                    </div>
                    <div class="relative">
                        <input type="checkbox" name="es_empresa" id="es_empresa" value="true" class="sr-only peer">
                        <div class="w-11 h-6 relative bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </div>
                </label>
            </div>
            <button type="submit" class="btn-buscar" style="width:100%; margin-top:1rem;">
                Crear cuenta
            </button>
        </form>

        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:#888;">
            ¿Ya tenés cuenta? <a href="/login" style="color:#6c63ff;">Iniciá sesión</a>
        </p>
        <a href="/" class="btn-limpiar" style="display:block; text-align:center; margin-top:0.5rem;">
            ← Volver a la página principal
        </a>
    </div>
</div>

{% endblock %}
