{% extends "base.html" %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <h1>🔐 Panel de administración</h1>
        <p class="login-sub">Ingresá tus credenciales para continuar</p>

        {% if error %}
        <div class="alert-error">❌ {{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="form-grupo">
                <label>Usuario</label>
                <input type="text" name="usuario" required autofocus placeholder="admin">
            </div>
            <div class="form-grupo">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-buscar" style="width:100%; margin-top:1rem;">
                Ingresar
            </button>
        </form>

        <a href="/" class="btn-limpiar" style="display:block; text-align:center; margin-top:1rem;">
            ← Volver a la página principal
        </a>
    </div>
</div>

{% endblock %}
