{% extends "base.html" %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <h1 class="flex items-center justify-center gap-2">🔒 Restablecer contraseña</h1>
        <p class="login-sub">Ingresá tu nueva contraseña para la cuenta <span class="font-semibold text-indigo-600 dark:text-indigo-400 break-all">{{ email }}</span>.</p>

        {% if error %}
        <div class="p-4 mb-4 text-sm text-red-800 rounded-2xl bg-red-50 dark:bg-red-950/30 dark:text-red-400 border border-red-100 dark:border-red-900/50 animate__animated animate__fadeIn">
            <span class="font-semibold">Error:</span> {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/restablecer-password" id="reset-form">
            <input type="hidden" name="token" value="{{ token }}">
            
            <div class="form-grupo">
                <label>Nueva contraseña</label>
                <input type="password" name="password" id="password" required placeholder="Mínimo 6 caracteres" autofocus>
            </div>
            
            <div class="form-grupo" style="margin-top: 1rem;">
                <label>Confirmar nueva contraseña</label>
                <input type="password" name="confirm_password" id="confirm_password" required placeholder="Confirmá tu contraseña">
            </div>
            
            <div id="password-match-error" class="p-3 mt-2 text-xs text-red-800 rounded-xl bg-red-50 dark:bg-red-950/30 dark:text-red-400 border border-red-100 dark:border-red-900/50 animate__animated animate__headShake" style="display: none;">
                ❌ Las contraseñas no coinciden
            </div>

            <button type="submit" class="btn-buscar" style="width:100%; margin-top:1.5rem;">
                Actualizar contraseña
            </button>
        </form>

        <a href="/login" class="btn-limpiar" style="display:block; text-align:center; margin-top:1rem;">
            ← Cancelar e ir a Iniciar sesión
        </a>
    </div>
</div>

<script>
    // Validar en el cliente que las contraseñas coincidan antes de enviar
    const form = document.getElementById('reset-form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const errorDiv = document.getElementById('password-match-error');

    form.addEventListener('submit', function(e) {
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            errorDiv.style.display = 'block';
            
            // Animación de sacudida si no coinciden
            errorDiv.classList.remove('animate__headShake');
            void errorDiv.offsetWidth; // Forzar reflow para reiniciar la animación
            errorDiv.classList.add('animate__headShake');
        } else {
            errorDiv.style.display = 'none';
        }
    });
</script>

{% endblock %}
