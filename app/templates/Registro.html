{% extends "base.html" %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <h1>🌟 Crear cuenta premium</h1>
        <p class="login-sub">Registrate para guardar tus planes favoritos y más.</p>

        {% if error %}
        <div class="alert-error">❌ {{ error }}</div>
        {% endif %}

        <form method="post" action="/registro">
            <div class="form-grupo">
                <label>Nombre</label>
                <input type="text" name="nombre" required placeholder="Tu nombre">
            </div>
            <div class="form-grupo">
                <label>Email</label>
                <input type="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-grupo">
                <label>Contraseña</label>
                <input type="password" name="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit" class="btn-buscar" style="width:100%; margin-top:1rem;">
                Crear cuenta
            </button>
        </form>

        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:#888;">
            ¿Ya tenés cuenta? <a href="/login" style="color:#6c63ff;">Iniciá sesión</a>
        </p>
        <a href="/" class="btn-limpiar" style="display:block; text-align:center; margin-top:0.5rem;">
            ← Volver a la página principal
        </a>
    </div>
</div>

{% endblock %}
